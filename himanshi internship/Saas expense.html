<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Expense Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#121212;
}

.card-box{
    border-radius:15px;
    transition:.3s;
}

.card-box:hover{
    transform:translateY(-5px);
}

.table-container{
    background:#1e1e1e;
    padding:20px;
    border-radius:15px;
}

.card{
    background:#1e1e1e;
    border:1px solid #333;
}

.table{
    color:#fff;
}

.table-bordered th,
.table-bordered td{
    border-color:#444;
}

.form-control,
.form-select{
    background:#2a2a2a;
    color:#fff;
    border:1px solid #444;
}

.form-control::placeholder{
    color:#aaa;
}

.form-control:focus,
.form-select:focus{
    background:#2a2a2a;
    color:#fff;
    border-color:#0d6efd;
    box-shadow:none;
}

h2{
    color:#fff;
}
</style>
</head>
<body>

<div class="container py-4">

    <h2 class="text-center mb-4">
        House Expense Dashboard
    </h2>

    <div class="row g-3">

        <div class="col-md-3">
            <div class="card card-box bg-success text-white">
                <div class="card-body">
                    <h5>Total Income</h5>
                    <h3 id="income">₹0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-box bg-danger text-white">
                <div class="card-body">
                    <h5>Total Expense</h5>
                    <h3 id="expense">₹0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-box bg-primary text-white">
                <div class="card-body">
                    <h5>Balance</h5>
                    <h3 id="balance">₹0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-box bg-warning">
                <div class="card-body">
                    <h5>Transactions</h5>
                    <h3 id="count">0</h3>
                </div>
            </div>
        </div>

    </div>

    <div class="card mt-4">
        <div class="card-body">

            <div class="row g-3">

                <div class="col-md-4">
                    <input type="text"
                           id="title"
                           class="form-control"
                           placeholder="Transaction Name">
                </div>

                <div class="col-md-3">
                    <input type="number"
                           id="amount"
                           class="form-control"
                           placeholder="Amount">
                </div>

                <div class="col-md-3">
                    <select id="type" class="form-select">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100"
                            onclick="addTransaction()">
                        Add
                    </button>
                </div>

            </div>

        </div>
    </div>

    <div class="table-container mt-4">

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Type</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="tableBody"></tbody>
        </table>

    </div>

</div>

<script>

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

function saveData(){
    localStorage.setItem(
        "transactions",
        JSON.stringify(transactions)
    );
}

function addTransaction(){

    const title =
    document.getElementById("title").value;

    const amount =
    document.getElementById("amount").value;

    const type =
    document.getElementById("type").value;

    if(title==="" || amount===""){
        return;
    }

    transactions.push({
        title,
        amount:Number(amount),
        type
    });

    saveData();
    render();

    document.getElementById("title").value="";
    document.getElementById("amount").value="";
}

function deleteTransaction(index){

    transactions.splice(index,1);

    saveData();
    render();
}

function render(){

    let income=0;
    let expense=0;

    const tableBody =
    document.getElementById("tableBody");

    tableBody.innerHTML="";

    transactions.forEach((item,index)=>{

        if(item.type==="income"){
            income += item.amount;
        }else{
            expense += item.amount;
        }

        tableBody.innerHTML += `
        <tr>
            <td>${item.title}</td>
            <td>₹${item.amount}</td>
            <td>${item.type}</td>
            <td>
                <button class="btn btn-danger btn-sm"
                onclick="deleteTransaction(${index})">
                Delete
                </button>
            </td>
        </tr>
        `;
    });

    document.getElementById("income").innerText =
    "₹"+income;

    document.getElementById("expense").innerText =
    "₹"+expense;

    document.getElementById("balance").innerText =
    "₹"+(income-expense);

    document.getElementById("count").innerText =
    transactions.length;
}

render();

</script>

</body>
</html>
